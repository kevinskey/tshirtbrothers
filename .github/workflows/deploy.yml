name: Deploy to droplet

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run deploy.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            sudo bash -c '
              set -e
              cd /var/www/tshirtbrothers
              git fetch origin
              git checkout main
              # If the droplet has commits on main that arent on origin/main,
              # the in-script "git pull --ff-only" cant recover. Do it here so
              # the freshly pulled deploy.sh always runs from a clean state.
              if ! git merge-base --is-ancestor HEAD origin/main; then
                ts=$(date +%Y%m%d-%H%M%S)
                echo "==> Local main diverged; tagging HEAD as droplet-backup-${ts} and resetting to origin/main"
                git tag "droplet-backup-${ts}" HEAD 2>/dev/null || true
                git reset --hard origin/main
              fi
              # Pull BEFORE invoking deploy.sh. Bash loads a script into
              # memory before executing; if deploy.sh pulls a newer version
              # of itself mid-run, the running process keeps executing the
              # stale in-memory copy. Doing the pull here guarantees bash
              # loads the latest deploy.sh from disk.
              git pull --ff-only origin main
              bash /var/www/tshirtbrothers/deploy.sh
            '
